services:
  api:
    image: bybatkhuu/rest-fastapi-template:8.0.3-260302
    build:
      context: .
    restart: unless-stopped
    environment:
      TERM: ${TERM:-xterm}
      TZ: ${TZ:-UTC}
      FT_API_PORT: ${FT_API_PORT:-8000}
    env_file:
      - path: .env
        required: false
    volumes:
      - "./volumes/configs/rest-fastapi-template:${FT_API_CONFIGS_DIR:-/etc/rest-fastapi-template}"
      - "./volumes/storage/rest-fastapi-template/logs:${FT_API_LOGS_DIR:-/var/log/rest-fastapi-template}"
      - "./volumes/storage/rest-fastapi-template/data:${FT_API_DATA_DIR:-/var/lib/rest-fastapi-template}"
    ports:
      - "${FT_API_PORT:-8000}:${FT_API_PORT:-8000}"
    tty: true
