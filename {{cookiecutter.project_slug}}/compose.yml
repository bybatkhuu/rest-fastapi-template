services:
  api:
    image: {{cookiecutter.docker_registry}}/{{cookiecutter.docker_repo_name}}:{{cookiecutter.version}}
    build:
      context: .
    restart: always
    environment:
      TERM: ${TERM:-xterm}
      TZ: ${TZ:-{{cookiecutter.timezone}}}
      {{cookiecutter.env_prefix}}API_PORT: {% raw %}${{% endraw %}{{cookiecutter.env_prefix}}API_PORT:-8000}
    env_file:
      - path: .env
        required: false
    volumes:
      - "./volumes/configs/{{cookiecutter.project_slug}}:{% raw %}${{% endraw %}{{cookiecutter.env_prefix}}API_CONFIGS_DIR:-/etc/{{cookiecutter.project_slug}}}"
      - "./volumes/storage/{{cookiecutter.project_slug}}/logs:{% raw %}${{% endraw %}{{cookiecutter.env_prefix}}API_LOGS_DIR:-/var/log/{{cookiecutter.project_slug}}}"
      - "./volumes/storage/{{cookiecutter.project_slug}}/data:{% raw %}${{% endraw %}{{cookiecutter.env_prefix}}API_DATA_DIR:-/var/lib/{{cookiecutter.project_slug}}}"
    ports:
      - "{% raw %}${{% endraw %}{{cookiecutter.env_prefix}}API_PORT:-8000}:{% raw %}${{% endraw %}{{cookiecutter.env_prefix}}API_PORT:-8000}"
    tty: true
