version: 2
updates:
  - package-ecosystem: "pip"
    target-branch: "cookiecutter"
    directory: "/"
    labels:
      - "dependency"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"

  - package-ecosystem: "pre-commit"
    target-branch: "cookiecutter"
    directory: "/"
    labels:
      - "styles"
      - "pre-commit"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
